name: BCBS Prefix Scraper

on:
  schedule:
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (20 prefixes only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Find Chrome path
        id: chrome
        run: |
          CHROME=$(which google-chrome-stable || which google-chrome || which chromium-browser || which chromium)
          echo "path=$CHROME" >> $GITHUB_OUTPUT
          echo "Chrome found at: $CHROME"
          $CHROME --version

      - name: Run scraper (test mode)
        if: github.event.inputs.test_mode == 'true'
        working-directory: scraper
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CHROME_PATH: ${{ steps.chrome.outputs.path }}
        run: node scrape.js --test

      - name: Run scraper (full mode)
        if: github.event.inputs.test_mode != 'true'
        working-directory: scraper
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CHROME_PATH: ${{ steps.chrome.outputs.path }}
        run: node scrape.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper/*.log
          retention-days: 7
